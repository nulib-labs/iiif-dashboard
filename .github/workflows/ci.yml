name: Validate and test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: yarn install --frozen-lockfile
      - run: make validate
      - run: make test
      - run: make build
