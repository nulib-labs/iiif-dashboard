name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - uses: jorelali/setup-elm@v6
        with:
          elm-version: 0.19.1
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: yarn install --frozen-lockfile
      - run: make build-with-results
        env:
          DASHBOARD_ORIGIN: ${{ vars.DASHBOARD_ORIGIN || format('https://{0}.github.io', github.repository_owner) }}
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
