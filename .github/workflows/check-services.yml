name: Refresh service results

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: service-results
  cancel-in-progress: false

jobs:
  check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: yarn install --frozen-lockfile
      - run: make validate
      - run: make build-with-results
        env:
          DASHBOARD_ORIGIN: ${{ vars.DASHBOARD_ORIGIN || format('https://{0}.github.io', github.repository_owner) }}
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: check
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
